<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Premium Reader App</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
  
  <style>
    * { touch-action: manipulation; }

    :root {
      --bg-color: #ffffff; 
      --text-color: #111827; 
      --ui-color: #737373;
      --accent: #d97706; 
      --glass-bg: rgba(255, 255, 255, 0.95); 
      --glass-border: rgba(0, 0, 0, 0.1);
      --ruler-color: #e5e5e5;
    }
    body.dark-mode {
      --bg-color: #121212; 
      --text-color: #f3f4f6; 
      --ui-color: #a3a3a3;
      --accent: #fbbf24;
      --glass-bg: rgba(18, 18, 18, 0.95); 
      --glass-border: rgba(255, 255, 255, 0.15);
      --ruler-color: #333333;
    }
    
    body {
      margin: 0; padding: 0; background-color: var(--bg-color); height: 100vh; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      transition: background-color 0.3s ease; color: var(--text-color);
    }
    
    #app-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    
    #top-nav { 
      position: absolute; top: 0; left: 0; width: 100%; height: 60px; 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 0 15px; z-index: 50; box-sizing: border-box;
      background: var(--glass-bg); backdrop-filter: blur(15px);
      border-bottom: 1px solid var(--glass-border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-right-group { display: flex; gap: 5px; transition: opacity 0.3s, transform 0.3s; }
    
    #libby-ui {
      position: absolute; bottom: 0; left: 0; width: 100%;
      padding: 10px 20px 25px 20px; box-sizing: border-box;
      background: var(--glass-bg); backdrop-filter: blur(15px);
      border-top: 1px solid var(--glass-border); z-index: 50;
      display: flex; flex-direction: column; gap: 12px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
    }

    body.reading-mode #top-nav { background: transparent; border-bottom-color: transparent; backdrop-filter: none; }
    body.reading-mode .nav-right-group { opacity: 0; pointer-events: none; transform: translateY(-10px); }
    body.reading-mode #libby-ui { transform: translateY(100%); opacity: 0; pointer-events: none; }
    
    .btn-icon { 
      background: transparent; border: none; color: var(--text-color); 
      width: 45px; height: 45px; cursor: pointer; display: flex; 
      justify-content: center; align-items: center; font-size: 1.4rem; 
      -webkit-tap-highlight-color: transparent; border-radius: 50%; transition: 0.2s;
    }
    .btn-icon:active { transform: scale(0.9); }
    
    #viewer-wrapper { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10;}
    
    /* CRITICAL FIX: Padding moved here so EPUB engine doesn't crash */
    #viewer { 
        width: 100%; height: 100%; max-width: 800px; margin: 0 auto; 
        padding: 65px 15px 110px 15px; box-sizing: border-box; 
    }

    .divider-row { position: relative; height: 1px; background: var(--glass-border); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;}
    .page-readout { font-size: 0.85rem; font-weight: 600; color: var(--text-color); padding: 0 10px; margin-top: -2px;}
    
    #cover-art-container {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 50px; height: 50px; border-radius: 50%; overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 2px solid var(--bg-color);
      background: var(--glass-border); z-index: 2;
    }
    #book-cover { width: 100%; height: 100%; object-fit: cover; }

    .chapter-stats { display: flex; justify-content: center; align-items: center; font-size: 0.75rem; font-weight: 700; }
    .chapter-title-stack { display: flex; flex-direction: column; align-items: center; text-align: center; }
    #chapter-title { color: var(--text-color); font-size: 0.85rem; max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;}
    #toc-trigger { color: var(--ui-color); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }

    .ruler-container { position: relative; height: 40px; display: flex; align-items: center; margin-top: 5px; max-width: 800px; margin-left: auto; margin-right: auto; width: 100%;}
    #progress-slider {
      -webkit-appearance: none; width: 100%; height: 30px; 
      background: repeating-linear-gradient(90deg, var(--ruler-color), var(--ruler-color) 1px, transparent 1px, transparent 8px);
      outline: none; cursor: pointer; position: relative; z-index: 5; border-radius: 5px;
    }
    #progress-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; 
      width: 4px; height: 35px; border-radius: 2px;
      background: var(--text-color); cursor: pointer; box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }
    #progress-slider:disabled { opacity: 0.5; cursor: not-allowed; }

    .bottom-actions { display: flex; justify-content: space-between; align-items: center; height: 30px; max-width: 800px; margin: 0 auto; width: 100%;}
    #jump-back { 
      background: none; border: none; font-size: 0.85rem; font-weight: 700; 
      color: var(--ui-color); display: flex; align-items: center; gap: 5px; 
      cursor: pointer; opacity: 0; pointer-events: none; transition: 0.3s;
    }
    #jump-back.active { opacity: 1; pointer-events: auto; }
    #jump-back:hover { color: var(--text-color); }
    #time-left { font-size: 0.75rem; font-weight: 600; color: var(--ui-color); }

    /* Sidebar & Overlays */
    #sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100%; background-color: var(--bg-color); border-right: 1px solid var(--glass-border); z-index: 100; box-shadow: 10px 0 30px rgba(0,0,0,0.1); transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
    #sidebar.open { left: 0; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 90; opacity: 0; pointer-events: none; transition: 0.3s; }
    #overlay.show { opacity: 1; pointer-events: auto; }
    
    .sidebar-tabs { display: flex; border-bottom: 1px solid var(--glass-border); }
    .tab-btn { flex: 1; padding: 20px 0; background: none; border: none; color: var(--ui-color); font-weight: 700; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    
    .sidebar-content { flex: 1; overflow-y: auto; display: none; }
    .sidebar-content.active { display: block; }
    #toc-list, #bookmark-list { padding: 10px 0; margin: 0; list-style: none; }
    #toc-list li a, .bookmark-item { display: block; padding: 15px 25px; color: var(--text-color); text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid var(--glass-border); cursor: pointer; }
    .bookmark-item { display: flex; justify-content: space-between; align-items: center; }
    .bookmark-delete { color: #ef4444; background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }

    #font-panel {
      position: absolute; top: 60px; right: 15px; width: 240px; background: var(--glass-bg); backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      z-index: 60; opacity: 0; pointer-events: none; transition: all 0.2s; transform: translateY(-10px); display: flex; flex-direction: column; gap: 12px;
    }
    #font-panel.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .font-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .font-control { flex: 1; background: transparent; border: 1px solid var(--glass-border); color: var(--text-color); padding: 8px 0; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.2s; }
    .font-control:hover, .font-control.active { background: var(--text-color); color: var(--bg-color); }
    
    #bookmark-toggle { color: var(--ui-color); transition: 0.2s; }
    #bookmark-toggle.bookmarked { color: var(--accent); }

    /* TOAST NOTIFICATION */
    #toast {
        position: fixed; top: -50px; left: 50%; transform: translateX(-50%);
        background: var(--text-color); color: var(--bg-color);
        padding: 10px 20px; border-radius: 20px; font-weight: 600; font-size: 0.9rem;
        opacity: 0; pointer-events: none; transition: opacity 0.3s, top 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 9999;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    #toast.show { opacity: 1; top: 30px; }

  </style>
</head>
<body>

  <div id="toast">Bookmark Saved</div>

  <div id="overlay"></div>
  <div id="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchTab('toc')">Index</button>
      <button class="tab-btn" onclick="switchTab('bookmarks')">Bookmarks</button>
    </div>
    <div id="toc-content" class="sidebar-content active">
      <ul id="toc-list"><li style="padding:20px; color:var(--ui-color);">Loading...</li></ul>
    </div>
    <div id="bookmarks-content" class="sidebar-content">
      <ul id="bookmark-list"></ul>
    </div>
  </div>

  <div id="app-container">
    <div id="top-nav">
      <button class="btn-icon" id="open-menu">☰</button> 
      <div class="nav-right-group">
        <button class="btn-icon" id="bookmark-toggle">🔖</button>
        <button class="btn-icon" id="font-btn">Aa</button>
        <button class="btn-icon" id="theme-toggle">🌙</button>
      </div>
    </div>

    <div id="font-panel">
      <div class="font-row">
        <button class="font-control" id="decrease-font">A-</button>
        <button class="font-control" id="increase-font">A+</button>
      </div>
      <div class="font-row">
        <button class="font-control" id="font-serif">Serif</button>
        <button class="font-control" id="font-sans">Sans</button>
      </div>
    </div>

    <div id="viewer-wrapper">
      <div id="viewer"></div>
    </div>

    <div id="libby-ui">
      <div class="divider-row">
        <span class="page-readout" id="page-current">pg. --</span>
        <div id="cover-art-container"><img id="book-cover" src="" alt="Cover"></div>
        <span class="page-readout" id="page-total">of --</span>
      </div>

      <div class="chapter-stats">
        <div class="chapter-title-stack">
          <span id="chapter-title">Loading Book...</span>
          <span id="toc-trigger">Table of Contents</span>
        </div>
      </div>

      <div class="ruler-container">
        <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1" disabled>
      </div>

      <div class="bottom-actions">
        <button id="jump-back">👈 <span id="ghost-target">pg. --</span></button>
        <span id="time-left"></span>
      </div>
    </div>
  </div>

  <script>
    // --- NUCLEAR CACHE BUSTER ---
    // This physically destroys the Service Worker cache so updates happen instantly.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) { registration.unregister(); }
      });
    }
    if (window.caches) {
      caches.keys().then(function(names) {
        for (let name of names) caches.delete(name);
      });
    }

    var book = ePub("book.epub");
    var rendition = book.renderTo("viewer", { width: "100%", height: "100%", spread: "auto", minSpreadWidth: 800, manager: "continuous", flow: "paginated" });

    function triggerHaptic(type = "light") {
        if (!navigator.vibrate) return;
        if (type === "light") navigator.vibrate(10);
        if (type === "heavy") navigator.vibrate(30);
    }

    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
    }

    // Bookmark Engine
    let bookmarks = JSON.parse(localStorage.getItem("awhiy-bookmarks")) || [];
    const bookmarkToggleBtn = document.getElementById("bookmark-toggle");
    let currentCfi = "";
    let currentChapterName = "";

    function renderBookmarks() {
        const list = document.getElementById("bookmark-list");
        list.innerHTML = "";
        if (bookmarks.length === 0) {
            list.innerHTML = `<li style="padding:20px; color:var(--ui-color); text-align:center;">No bookmarks yet. Tap 🔖 to save a page.</li>`;
            return;
        }
        bookmarks.forEach((bm, index) => {
            const li = document.createElement("div");
            li.className = "bookmark-item";
            li.innerHTML = `
                <span onclick="goToBookmark('${bm.cfi}')" style="flex:1;">${bm.name} <br><small style="color:var(--ui-color)">${bm.preview}</small></span>
                <button class="bookmark-delete" onclick="deleteBookmark(${index})">✕</button>
            `;
            list.appendChild(li);
        });
    }

    bookmarkToggleBtn.onclick = () => {
        triggerHaptic("heavy");
        const existingIndex = bookmarks.findIndex(b => b.cfi === currentCfi);
        if (existingIndex > -1) {
            bookmarks.splice(existingIndex, 1);
            bookmarkToggleBtn.classList.remove("bookmarked");
            showToast("Bookmark Removed");
        } else {
            bookmarks.push({ cfi: currentCfi, name: currentChapterName, preview: new Date().toLocaleDateString() });
            bookmarkToggleBtn.classList.add("bookmarked");
            showToast("🔖 Bookmark Saved");
        }
        localStorage.setItem("awhiy-bookmarks", JSON.stringify(bookmarks));
        renderBookmarks();
    };

    window.deleteBookmark = (index) => {
        bookmarks.splice(index, 1);
        localStorage.setItem("awhiy-bookmarks", JSON.stringify(bookmarks));
        renderBookmarks();
        checkIfBookmarked(currentCfi);
    };

    window.goToBookmark = (cfi) => { saveHistory(); rendition.display(cfi); closeSidebar(); };

    function checkIfBookmarked(cfi) {
        if (bookmarks.some(b => b.cfi === cfi)) bookmarkToggleBtn.classList.add("bookmarked");
        else bookmarkToggleBtn.classList.remove("bookmarked");
    }
    renderBookmarks();

    book.loaded.cover.then(coverUrl => {
        if(coverUrl) { book.archive.createUrl(coverUrl).then(url => { document.getElementById('book-cover').src = url; }); }
    });

    // CRITICAL FIX: Safe, simple themes that won't crash the EPUB engine
    rendition.themes.register("light", { "body": { "background": "#ffffff", "color": "#111827" } });
    rendition.themes.register("dark", { "body": { "background": "#121212", "color": "#f3f4f6" } });
    
    const isInitiallyDark = document.body.classList.contains("dark-mode");
    rendition.themes.select(isInitiallyDark ? "dark" : "light");

    let currentFontSize = parseInt(localStorage.getItem("awhiy-fontsize")) || 110;
    let currentFontFamily = localStorage.getItem("awhiy-fontfamily") || "Georgia, serif";

    let isExactMath = false;
    let totalPages = 0;
    let isDragging = false; 

    const pageTotalText = document.getElementById("page-total");
    const pageCurrentText = document.getElementById("page-current");
    const chapterText = document.getElementById("chapter-title");
    const timeLeftText = document.getElementById("time-left");

    function recalculatePages() {
        let charsPerPage = Math.max(500, Math.round(1600 * (100 / currentFontSize)));
        book.locations.generate(charsPerPage).then((locations) => {
           isExactMath = true;
           totalPages = locations.length;
           pageTotalText.innerText = "of " + totalPages;
           if (rendition.location && rendition.location.start) {
               updateUI(rendition.location.start.cfi, rendition.location.start.href, rendition.location.start.index);
           }
        }).catch(err => { pageTotalText.innerText = ""; });
    }

    function applyTypography() {
      rendition.themes.fontSize(currentFontSize + "%");
      rendition.themes.font(currentFontFamily);
      localStorage.setItem("awhiy-fontsize", currentFontSize);
      localStorage.setItem("awhiy-fontfamily", currentFontFamily);
      document.getElementById("font-serif").classList.toggle("active", currentFontFamily.includes("serif"));
      document.getElementById("font-sans").classList.toggle("active", !currentFontFamily.includes("serif"));
      recalculatePages();
    }
    
    let savedCfi = localStorage.getItem("awhiy-progress");
    rendition.display(savedCfi || undefined).then(() => { applyTypography(); });

    document.getElementById("font-btn").onclick = (e) => { e.stopPropagation(); document.getElementById("font-panel").classList.toggle("show"); };
    document.getElementById("increase-font").onclick = () => { triggerHaptic(); if (currentFontSize < 200) { currentFontSize += 15; applyTypography(); } };
    document.getElementById("decrease-font").onclick = () => { triggerHaptic(); if (currentFontSize > 80) { currentFontSize -= 15; applyTypography(); } };
    document.getElementById("font-serif").onclick = () => { triggerHaptic(); currentFontFamily = "Georgia, serif"; applyTypography(); };
    document.getElementById("font-sans").onclick = () => { triggerHaptic(); currentFontFamily = "-apple-system, sans-serif"; applyTypography(); };

    const slider = document.getElementById("progress-slider");
    const jumpBtn = document.getElementById("jump-back");
    const ghostTargetText = document.getElementById("ghost-target");

    let historyCfi = null; 

    book.loaded.navigation.then((nav) => {
      const tocList = document.getElementById("toc-list"); tocList.innerHTML = ""; 
      if (nav && nav.length > 0) {
        nav.forEach(chapter => {
          const li = document.createElement("li"), a = document.createElement("a");
          a.textContent = chapter.label.trim(); a.href = chapter.href;
          a.onclick = (e) => { e.preventDefault(); saveHistory(); rendition.display(chapter.href); closeSidebar(); };
          li.appendChild(a); tocList.appendChild(li);
        });
      }
    });

    slider.addEventListener("input", function() {
      isDragging = true; triggerHaptic("light");
      let percentage = slider.value / 100;
      if (isExactMath) {
          let estimatedPage = Math.round(percentage * totalPages) || 1;
          pageCurrentText.innerText = "pg. " + estimatedPage;
      } else { pageCurrentText.innerText = Math.round(slider.value) + "%"; }
    });

    slider.addEventListener("change", function() {
      saveHistory(); 
      let percentage = slider.value / 100;
      if (isExactMath) { rendition.display(book.locations.cfiFromPercentage(percentage)).then(() => { isDragging = false; }); } 
      else {
          let targetIndex = Math.floor(percentage * book.spine.length);
          if (book.spine.get(targetIndex)) rendition.display(book.spine.get(targetIndex).href).then(() => { isDragging = false; });
          else isDragging = false;
      }
    });

    function saveHistory() {
      if(rendition.location && rendition.location.start) {
        historyCfi = rendition.location.start.cfi;
        let p = isExactMath ? book.locations.locationFromCfi(historyCfi) : Math.round(slider.value) + "%";
        ghostTargetText.innerText = isExactMath ? `pg. ${p}` : p;
        jumpBtn.classList.add("active");
      }
    }
    
    jumpBtn.onclick = () => { triggerHaptic(); if(historyCfi) { rendition.display(historyCfi); jumpBtn.classList.remove("active"); historyCfi = null; } };

    function updateUI(cfi, href, index) {
      currentCfi = cfi; checkIfBookmarked(cfi); slider.disabled = false;
      if (isDragging) return; 
      
      let navItem = book.navigation.get(href);
      currentChapterName = (navItem && navItem.label) ? navItem.label.trim() : "Part " + (index + 1);
      chapterText.innerText = currentChapterName;

      if (isExactMath) {
          let currentPage = book.locations.locationFromCfi(cfi);
          let percentage = Math.round(book.locations.percentageFromCfi(cfi) * 100);
          pageCurrentText.innerText = "pg. " + currentPage;
          slider.value = percentage;
          
          let pagesLeft = totalPages - currentPage;
          let minsLeft = Math.max(1, Math.round(pagesLeft * 1.2)); 
          timeLeftText.innerText = minsLeft > 60 ? Math.round(minsLeft/60) + " hrs left" : minsLeft + " mins left";
      } else {
          let percentage = Math.round((index / book.spine.length) * 100);
          pageCurrentText.innerText = percentage + "%";
          slider.value = percentage; timeLeftText.innerText = "";
      }
    }

    rendition.on("relocated", function(location) {
      localStorage.setItem("awhiy-progress", location.start.cfi);
      updateUI(location.start.cfi, location.start.href, location.start.index);
    });

    let touchStartX = 0; let touchEndX = 0;
    function handleSwipe() {
        if (touchEndX < touchStartX - 40) { triggerHaptic("light"); jumpBtn.classList.remove("active"); historyCfi = null; rendition.next(); }
        if (touchEndX > touchStartX + 40) { triggerHaptic("light"); jumpBtn.classList.remove("active"); historyCfi = null; rendition.prev(); }
    }
    
    rendition.on('touchstart', event => { touchStartX = event.changedTouches[0].screenX; });
    rendition.on('touchend', event => { touchEndX = event.changedTouches[0].screenX; handleSwipe(); });
    
    // SMART TAP
    rendition.on("click", (e) => {
        const width = window.innerWidth;
        const x = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
        if (!x) return;
        
        if (x < width * 0.25) { triggerHaptic("light"); rendition.prev(); }
        else if (x > width * 0.75) { triggerHaptic("light"); rendition.next(); }
        else { 
            document.body.classList.toggle("reading-mode"); 
            document.getElementById("font-panel").classList.remove("show");
        }
    });

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.sidebar-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(`${tab}-content`).classList.add('active');
    }

    const overlay = document.getElementById("overlay");
    function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); overlay.classList.remove("show"); document.getElementById("font-panel").classList.remove("show");}
    function openSidebar() { triggerHaptic(); document.getElementById("sidebar").classList.add("open"); overlay.classList.add("show"); }
    
    overlay.addEventListener('click', closeSidebar);
    overlay.addEventListener('touchstart', closeSidebar, {passive: true});
    document.getElementById("open-menu").onclick = openSidebar; 
    document.getElementById("toc-trigger").onclick = openSidebar;

    document.getElementById("theme-toggle").onclick = function() {
      triggerHaptic();
      document.body.classList.toggle("dark-mode");
      const isDark = document.body.classList.contains("dark-mode");
      rendition.themes.select(isDark ? "dark" : "light");
      document.querySelector('meta[name="theme-color"]').setAttribute('content', isDark ? '#121212' : '#ffffff');
      this.innerText = isDark ? "☀️" : "🌙";
    };

    document.addEventListener("keyup", (e) => { if (e.key === "ArrowLeft") rendition.prev(); if (e.key === "ArrowRight") rendition.next(); });
  </script>
</body>
</html>
