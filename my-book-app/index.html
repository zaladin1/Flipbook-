<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Event Agenda</title>
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fcfaf8">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Book_icon_1.png/512px-Book_icon_1.png">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
  
  <style>
    :root {
      --bg-color: #fcfaf8; --text-color: #2b2b2b; --ui-color: #888;
      --accent: #2b2b2b; --glass-bg: rgba(252, 250, 248, 0.95); --glass-border: rgba(0, 0, 0, 0.08);
    }
    body.dark-mode {
      --bg-color: #121212; --text-color: #e8eaed; --ui-color: #777;
      --accent: #ffffff; --glass-bg: rgba(18, 18, 18, 0.95); --glass-border: rgba(255, 255, 255, 0.1);
    }
    body {
      margin: 0; padding: 0; background-color: var(--bg-color); height: 100vh; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; transition: background-color 0.3s ease;
    }
    #app-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    
    /* Top Navigation */
    #top-nav { 
      height: 60px; display: flex; justify-content: space-between; align-items: center; 
      padding: 0 15px; z-index: 50; width: 100%; box-sizing: border-box;
    }
    .nav-group { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-icon { 
      background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); 
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; 
      justify-content: center; align-items: center; font-size: 1.1rem; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; font-weight: 600;
      -webkit-tap-highlight-color: transparent; 
    }
    .btn-icon:hover { transform: scale(1.05); }
    .book-title-header { 
      font-weight: 600; font-size: 0.8rem; letter-spacing: 2px; color: var(--ui-color); 
      text-transform: uppercase; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
      flex: 1; padding: 0 10px;
    }
    
    /* Reader Area */
    #viewer-wrapper { flex: 1; position: relative; width: 100%; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
    #viewer { width: 100%; height: 90%; }
    
    .touch-zone { position: absolute; top: 0; bottom: 0; width: 25%; z-index: 35; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    #left-zone { left: 0; } #right-zone { right: 0; }
    
    .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; z-index: 40; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s; }
    .nav-arrow:hover { background: var(--accent); color: var(--bg-color); }
    #prev-btn { left: -50px; } #next-btn { right: -50px; }
    
    /* Interactive Scrubber Timeline */
    #scrubber-bar { 
      height: 60px; display: flex; justify-content: space-between; align-items: center; 
      padding: 0 25px; gap: 20px; z-index: 50; 
    }
    .scrubber-text { 
      font-size: 0.75rem; font-weight: 600; color: var(--ui-color); 
      letter-spacing: 1px; text-transform: uppercase; white-space: nowrap;
    }
    #scrubber-chapter { flex-shrink: 0; max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
    
    .range-container { flex: 1; display: flex; align-items: center; }
    #progress-slider {
      -webkit-appearance: none; width: 100%; height: 4px; 
      background: var(--glass-border); border-radius: 2px; outline: none; cursor: pointer;
      transition: background 0.3s;
    }
    #progress-slider::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; }
    #progress-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 16px; height: 16px; 
      border-radius: 50%; background: var(--text-color); cursor: pointer; 
      margin-top: -6px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 0.1s;
    }
    #progress-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
    #progress-slider:disabled { opacity: 0.5; cursor: not-allowed; }
    #progress-slider:disabled::-webkit-slider-thumb { cursor: not-allowed; }

    /* Menus & Overlays */
    #sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100%; background-color: var(--glass-bg); backdrop-filter: blur(15px); z-index: 100; box-shadow: 5px 0 20px rgba(0,0,0,0.1); transition: left 0.3s ease; display: flex; flex-direction: column; }
    #sidebar.open { left: 0; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90; opacity: 0; pointer-events: none; transition: 0.3s; }
    #overlay.show { opacity: 1; pointer-events: auto; }
    #sidebar-header { padding: 25px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.1rem; color: var(--text-color); }
    #toc-list { flex: 1; overflow-y: auto; padding: 10px 0; margin: 0; list-style: none; }
    #toc-list li a { display: block; padding: 15px 25px; color: var(--text-color); text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid var(--glass-border); transition: 0.2s; }

    #font-panel {
      position: absolute; top: 65px; right: 20px; width: 240px; background: var(--glass-bg); backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border); border-radius: 12px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      z-index: 60; opacity: 0; pointer-events: none; transition: all 0.2s; transform: translateY(-10px); display: flex; flex-direction: column; gap: 12px;
    }
    #font-panel.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .font-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .font-control { flex: 1; background: transparent; border: 1px solid var(--glass-border); color: var(--text-color); padding: 8px 0; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: 0.2s; }
    .font-control:hover, .font-control.active { background: var(--text-color); color: var(--bg-color); }
    #font-size-display { font-size: 0.85rem; color: var(--ui-color); font-weight: 600; width: 40px; text-align: center; }

    #share-bar { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--text-color); color: var(--bg-color); padding: 15px 25px; border-radius: 30px; display: flex; gap: 20px; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 200; transition: bottom 0.3s; font-weight: 600; font-size: 0.9rem; }
    #share-bar.active { bottom: 80px; } 
    .share-btn { background: none; border: none; color: inherit; font-weight: inherit; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }

    @media (max-width: 1300px) { #prev-btn { left: 10px; } #next-btn { right: 10px; } }
    @media (max-width: 900px) { 
      .nav-arrow { display: none !important; } #viewer-wrapper { max-width: 95vw; } 
      #scrubber-bar { padding: 0 15px; gap: 10px; }
      #scrubber-chapter { max-width: 80px; font-size: 0.65rem; }
    }
  </style>
</head>
<body>

  <div id="overlay"></div>
  <div id="sidebar">
    <div id="sidebar-header"><span>Index</span><button class="btn-icon" id="close-menu" style="width:30px;height:30px;font-size:0.9rem;">✕</button></div>
    <ul id="toc-list"><li id="toc-loading"><a href="#">Loading document...</a></li></ul>
  </div>

  <div id="app-container">
    <div id="top-nav">
      <button class="btn-icon" id="open-menu">☰</button>
      <div class="book-title-header" id="main-title">Interactive Reader</div>
      <div class="nav-group">
        <button class="btn-icon" id="font-btn">Aa</button>
        <button class="btn-icon" id="theme-toggle">🌙</button>
      </div>
    </div>

    <div id="font-panel">
      <div class="font-row">
        <button class="font-control" id="decrease-font">A-</button>
        <span id="font-size-display">115%</span>
        <button class="font-control" id="increase-font">A+</button>
      </div>
      <div class="font-row">
        <button class="font-control" id="font-serif">Serif</button>
        <button class="font-control" id="font-sans">Sans</button>
      </div>
    </div>

    <div id="viewer-wrapper">
      <div id="left-zone" class="touch-zone"></div>
      <div id="right-zone" class="touch-zone"></div>
      <button class="nav-arrow" id="prev-btn">‹</button>
      <div id="viewer"></div>
      <button class="nav-arrow" id="next-btn">›</button>
    </div>

    <div id="scrubber-bar">
      <div id="scrubber-chapter" class="scrubber-text">Loading...</div>
      <div class="range-container">
        <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1" disabled>
      </div>
      <div id="scrubber-percent" class="scrubber-text">0%</div>
    </div>
  </div>

  <div id="share-bar">
    <button class="share-btn" id="copy-btn">📋 Copy</button>
    <button class="share-btn" id="x-btn">𝕏 Share</button>
    <button class="share-btn" id="close-share" style="margin-left: 10px; opacity: 0.5;">✕</button>
  </div>

  <script>
    // 1. Service Worker for PWA Offline Mode
    if ('serviceWorker' in navigator) { 
      window.addEventListener('load', () => { 
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed: ', err)); 
      }); 
    }

    // 2. Initialize Book Engine
    var book = ePub("book.epub");
    var rendition = book.renderTo("viewer", {
      width: "100%", height: "100%", spread: "auto", minSpreadWidth: 800, manager: "continuous", flow: "paginated"
    });

    book.loaded.metadata.then(function(meta){
       if(meta.title) document.getElementById("main-title").innerText = meta.title;
    });

    // 3. Typography Engine
    rendition.themes.register("light", { "body": { "background": "transparent", "color": "#2b2b2b", "line-height": "1.7", "padding": "10px 15px", "text-align": "justify" }, "::selection": {"background": "rgba(0,0,0,0.1)"} });
    rendition.themes.register("dark", { "body": { "background": "transparent", "color": "#e8eaed", "line-height": "1.7", "padding": "10px 15px", "text-align": "justify" }, "::selection": {"background": "rgba(255,255,255,0.2)"} });
    rendition.themes.select("light");

    let currentFontSize = parseInt(localStorage.getItem("awhiy-fontsize")) || 110;
    let currentFontFamily = localStorage.getItem("awhiy-fontfamily") || "Georgia, serif";

    function applyTypography() {
      rendition.themes.fontSize(currentFontSize + "%");
      rendition.themes.font(currentFontFamily);
      document.getElementById("font-size-display").innerText = currentFontSize + "%";
      localStorage.setItem("awhiy-fontsize", currentFontSize);
      localStorage.setItem("awhiy-fontfamily", currentFontFamily);
      document.getElementById("font-serif").classList.toggle("active", currentFontFamily.includes("serif"));
      document.getElementById("font-sans").classList.toggle("active", !currentFontFamily.includes("serif"));
    }
    applyTypography();

    document.getElementById("font-btn").onclick = (e) => { e.stopPropagation(); document.getElementById("font-panel").classList.toggle("show"); };
    document.getElementById("increase-font").onclick = () => { if (currentFontSize < 200) currentFontSize += 10; applyTypography(); };
    document.getElementById("decrease-font").onclick = () => { if (currentFontSize > 80) currentFontSize -= 10; applyTypography(); };
    document.getElementById("font-serif").onclick = () => { currentFontFamily = "Georgia, serif"; applyTypography(); };
    document.getElementById("font-sans").onclick = () => { currentFontFamily = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"; applyTypography(); };

    function closeMenus(e) {
      if(!e.target.closest("#font-panel") && !e.target.closest("#font-btn")) document.getElementById("font-panel").classList.remove("show");
    }
    document.addEventListener("click", closeMenus); document.addEventListener("touchstart", closeMenus);

    // 4. INSTANT DISPLAY (Crucial Fix: Do not wait for math)
    const slider = document.getElementById("progress-slider");
    const percentText = document.getElementById("scrubber-percent");
    const chapterText = document.getElementById("scrubber-chapter");

    let savedCfi = localStorage.getItem("awhiy-progress");
    rendition.display(savedCfi || undefined);

    // 5. Load Sidebar TOC Asynchronously
    book.loaded.navigation.then((nav) => {
      const tocList = document.getElementById("toc-list"); tocList.innerHTML = ""; 
      if (nav && nav.length > 0) {
        nav.forEach(chapter => {
          const li = document.createElement("li"), a = document.createElement("a");
          a.textContent = chapter.label.trim(); a.href = chapter.href;
          a.onclick = (e) => { e.preventDefault(); rendition.display(chapter.href); closeSidebar(); };
          li.appendChild(a); tocList.appendChild(li);
        });
      } else {
        book.spine.each((item, index) => {
          const li = document.createElement("li"), a = document.createElement("a");
          a.textContent = "Part " + (index + 1); a.href = item.href;
          a.onclick = (e) => { e.preventDefault(); rendition.display(item.href); closeSidebar(); };
          li.appendChild(a); tocList.appendChild(li);
        });
      }
    }).catch(() => {
        document.getElementById("toc-loading").innerText = "Index Unavailable";
    });

    // 6. Background Engine for Scrubber Math
    book.ready.then(() => {
      slider.disabled = false; 
      
      book.locations.generate(1600).then(() => {
         console.log("Exact math generated.");
         if (rendition.location && rendition.location.start) {
             let exactPercent = Math.round(book.locations.percentageFromCfi(rendition.location.start.cfi) * 100);
             slider.value = exactPercent;
             percentText.innerText = exactPercent + "%";
             updateSliderGradient(exactPercent);
         }
      }).catch(err => console.warn("Using Fallback Math Engine."));
    });

    slider.addEventListener("change", function() {
      let percentage = slider.value / 100;
      if (book.locations.length() > 0) {
          rendition.display(book.locations.cfiFromPercentage(percentage));
      } else {
          let targetIndex = Math.floor(percentage * book.spine.length);
          if (book.spine.get(targetIndex)) rendition.display(book.spine.get(targetIndex).href);
      }
    });

    slider.addEventListener("input", function() {
      updateSliderGradient(slider.value);
      percentText.innerText = Math.round(slider.value) + "%";
    });

    function updateSliderGradient(val) {
      let color = document.body.classList.contains("dark-mode") ? "#ffffff" : "#2b2b2b";
      slider.style.background = `linear-gradient(to right, ${color} ${val}%, var(--glass-border) ${val}%)`;
    }

    // 7. Navigation & GA4 Tracking
    rendition.on("relocated", function(location) {
      localStorage.setItem("awhiy-progress", location.start.cfi);
      
      let navItem = book.navigation.get(location.start.href);
      let currentText = (navItem && navItem.label) ? navItem.label.trim() : "Part " + (location.start.index + 1);
      chapterText.innerText = currentText;

      let percentage = 0;
      if (book.locations.length() > 0) {
          percentage = Math.round(book.locations.percentageFromCfi(location.start.cfi) * 100);
      } else {
          percentage = Math.round((location.start.index / book.spine.length) * 100);
      }
      
      slider.value = percentage;
      percentText.innerText = percentage + "%";
      updateSliderGradient(percentage);
      document.getElementById("share-bar").classList.remove("active");

      if (typeof gtag === 'function') {
        gtag('event', 'page_view', {
          page_title: currentText,
          page_location: window.location.origin + window.location.pathname + "?section=" + encodeURIComponent(currentText)
        });
      }
    });

    // 8. Highlighting Logic
    let selectedText = "";
    rendition.on("selected", function(cfiRange, contents) {
      book.getRange(cfiRange).then(function(range) {
        selectedText = range.toString().trim();
        if (selectedText.length > 0) document.getElementById("share-bar").classList.add("active");
      });
    });

    rendition.on("click", () => { document.getElementById("share-bar").classList.remove("active"); document.getElementById("font-panel").classList.remove("show"); });

    document.getElementById("close-share").onclick = () => document.getElementById("share-bar").classList.remove("active");
    document.getElementById("copy-btn").onclick = () => { navigator.clipboard.writeText(`"${selectedText}" — Read it here: ${window.location.href}`); document.getElementById("copy-btn").innerText = "✅ Copied!"; setTimeout(() => document.getElementById("copy-btn").innerText = "📋 Copy", 2000); };
    document.getElementById("x-btn").onclick = () => { let tweetText = encodeURIComponent(`"${selectedText}"`); let tweetUrl = encodeURIComponent(window.location.href); window.open(`https://twitter.com/intent/tweet?text=${tweetText}&url=${tweetUrl}`, '_blank'); };

    // 9. Menus & Controls
    function openSidebar() { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").classList.add("show"); }
    function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }
    document.getElementById("open-menu").onclick = openSidebar; document.getElementById("close-menu").onclick = closeSidebar; document.getElementById("overlay").onclick = closeSidebar;
    
    document.getElementById("theme-toggle").onclick = function() {
      document.body.classList.toggle("dark-mode");
      const isDark = document.body.classList.contains("dark-mode");
      rendition.themes.select(isDark ? "dark" : "light");
      document.querySelector('meta[name="theme-color"]').setAttribute('content', isDark ? '#121212' : '#fcfaf8');
      this.innerText = isDark ? "☀️" : "🌙";
      updateSliderGradient(slider.value); 
    };

    document.getElementById("prev-btn").onclick = () => rendition.prev(); document.getElementById("next-btn").onclick = () => rendition.next();
    document.getElementById("left-zone").onclick = () => rendition.prev(); document.getElementById("right-zone").onclick = () => rendition.next();
    document.addEventListener("keyup", (e) => { if (e.key === "ArrowLeft") rendition.prev(); if (e.key === "ArrowRight") rendition.next(); });
  </script>
</body>
</html>
