<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All We Have Is Yesterday</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f8f9fa">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Book_icon_1.png/512px-Book_icon_1.png">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
  
  <style>
    :root {
      --bg-color: #f8f9fa; --text-color: #202124; --ui-color: #5f6368;
      --accent: #000000; --glass-bg: rgba(255, 255, 255, 0.95); --glass-border: rgba(0, 0, 0, 0.08);
    }
    body.dark-mode {
      --bg-color: #121212; --text-color: #e8eaed; --ui-color: #9aa0a6;
      --accent: #ffffff; --glass-bg: rgba(30, 30, 30, 0.95); --glass-border: rgba(255, 255, 255, 0.1);
    }
    body {
      margin: 0; padding: 0; background-color: var(--bg-color); height: 100vh; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; transition: background-color 0.3s ease;
    }
    #app-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    
    /* --- Mobile-Optimized Top Nav --- */
    #top-nav { 
      height: 60px; display: flex; justify-content: space-between; align-items: center; 
      padding: 0 15px; z-index: 50; width: 100%; box-sizing: border-box;
    }
    .nav-group { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-icon { 
      background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); 
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; 
      justify-content: center; align-items: center; font-size: 1.1rem; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s; font-weight: 600;
      -webkit-tap-highlight-color: transparent; 
    }
    .btn-icon:hover { transform: scale(1.05); }
    .book-title-header { 
      font-weight: 600; font-size: 0.85rem; letter-spacing: 1.5px; color: var(--ui-color); 
      text-transform: uppercase; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
      flex: 1; padding: 0 10px;
    }
    
    #viewer-wrapper { flex: 1; position: relative; width: 100%; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
    #viewer { width: 100%; height: 90%; }
    
    /* Invisible Touch Zones */
    .touch-zone { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 35; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    #left-zone { left: 0; } #right-zone { right: 0; }
    
    /* Floating Arrows */
    .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; z-index: 40; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s; }
    .nav-arrow:hover { background: var(--accent); color: var(--bg-color); }
    #prev-btn { left: -50px; } #next-btn { right: -50px; }
    
    #bottom-bar { height: 40px; display: flex; justify-content: center; align-items: center; padding: 0 20px 10px 20px; }
    #stats-text { font-size: 0.75rem; font-weight: 600; color: var(--ui-color); letter-spacing: 1px; text-transform: uppercase; }

    /* Sidebar TOC */
    #sidebar { position: fixed; top: 0; left: -320px; width: 320px; height: 100%; background-color: var(--glass-bg); backdrop-filter: blur(15px); z-index: 100; box-shadow: 5px 0 20px rgba(0,0,0,0.1); transition: left 0.3s ease; display: flex; flex-direction: column; }
    #sidebar.open { left: 0; }
    #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90; opacity: 0; pointer-events: none; transition: 0.3s; }
    #overlay.show { opacity: 1; pointer-events: auto; }
    #sidebar-header { padding: 25px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1.1rem; color: var(--text-color); }
    #toc-list { flex: 1; overflow-y: auto; padding: 10px 0; margin: 0; list-style: none; }
    #toc-list li a { display: block; padding: 15px 25px; color: var(--text-color); text-decoration: none; font-size: 0.95rem; border-bottom: 1px solid var(--glass-border); transition: 0.2s; }

    /* Typography Settings Panel */
    #font-panel {
      position: absolute; top: 65px; right: 20px; width: 240px;
      background: var(--glass-bg); backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border); border-radius: 12px;
      padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      z-index: 60; opacity: 0; pointer-events: none; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform: translateY(-10px); display: flex; flex-direction: column; gap: 12px;
    }
    #font-panel.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .font-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .font-control {
      flex: 1; background: transparent; border: 1px solid var(--glass-border);
      color: var(--text-color); padding: 8px 0; border-radius: 6px; cursor: pointer;
      font-weight: 600; font-size: 0.95rem; transition: 0.2s;
    }
    .font-control:hover, .font-control.active { background: var(--text-color); color: var(--bg-color); }
    #font-size-display { font-size: 0.85rem; color: var(--ui-color); font-weight: 600; width: 40px; text-align: center; }

    /* Highlighting & Share UI */
    #share-bar { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--text-color); color: var(--bg-color); padding: 15px 25px; border-radius: 30px; display: flex; gap: 20px; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 200; transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 600; font-size: 0.9rem; }
    #share-bar.active { bottom: 30px; }
    .share-btn { background: none; border: none; color: inherit; font-weight: inherit; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    #quote-preview { display: none; } 

    @media (max-width: 1300px) { #prev-btn { left: 10px; } #next-btn { right: 10px; } }
    @media (max-width: 900px) { .nav-arrow { display: none !important; } #viewer-wrapper { max-width: 90vw; } }
  </style>
</head>
<body>

  <div id="overlay"></div>
  <div id="sidebar">
    <div id="sidebar-header"><span>Index</span><button class="btn-icon" id="close-menu" style="width:30px;height:30px;font-size:0.9rem;">✕</button></div>
    <ul id="toc-list"><li id="toc-loading"><a href="#">Loading chapters...</a></li></ul>
  </div>

  <div id="app-container">
    <div id="top-nav">
      <button class="btn-icon" id="open-menu">☰</button>
      <div class="book-title-header">All We Have Is Yesterday</div>
      <div class="nav-group">
        <button class="btn-icon" id="font-btn">Aa</button>
        <button class="btn-icon" id="theme-toggle">🌙</button>
      </div>
    </div>

    <div id="font-panel">
      <div class="font-row">
        <button class="font-control" id="decrease-font">A-</button>
        <span id="font-size-display">115%</span>
        <button class="font-control" id="increase-font">A+</button>
      </div>
      <div class="font-row">
        <button class="font-control" id="font-serif">Serif</button>
        <button class="font-control" id="font-sans">Sans</button>
      </div>
    </div>

    <div id="viewer-wrapper">
      <div id="left-zone" class="touch-zone"></div>
      <div id="right-zone" class="touch-zone"></div>
      <button class="nav-arrow" id="prev-btn">‹</button>
      <div id="viewer"></div>
      <button class="nav-arrow" id="next-btn">›</button>
    </div>

    <div id="bottom-bar"><div id="stats-text">Reading...</div></div>
  </div>

  <div id="share-bar">
    <span id="quote-preview"></span>
    <button class="share-btn" id="copy-btn">📋 Copy</button>
    <button class="share-btn" id="x-btn">𝕏 Share</button>
    <button class="share-btn" id="close-share" style="margin-left: 10px; opacity: 0.5;">✕</button>
  </div>

  <script>
    // PWA Service Worker
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed: ', err)); }); }

    var book = ePub("book.epub");
    var rendition = book.renderTo("viewer", {
      width: "100%", height: "100%", spread: "auto", minSpreadWidth: 800, manager: "continuous", flow: "paginated"
    });

    rendition.themes.register("light", { "body": { "background": "transparent", "color": "#202124", "line-height": "1.7", "padding": "10px 15px", "text-align": "justify" }, "::selection": {"background": "rgba(0,0,0,0.1)"} });
    rendition.themes.register("dark", { "body": { "background": "transparent", "color": "#e8eaed", "line-height": "1.7", "padding": "10px 15px", "text-align": "justify" }, "::selection": {"background": "rgba(255,255,255,0.2)"} });
    rendition.themes.select("light");

    // Dynamic Typography Engine
    let currentFontSize = parseInt(localStorage.getItem("awhiy-fontsize")) || 110;
    let currentFontFamily = localStorage.getItem("awhiy-fontfamily") || "Georgia, serif";

    function applyTypography() {
      rendition.themes.fontSize(currentFontSize + "%");
      rendition.themes.font(currentFontFamily);
      
      document.getElementById("font-size-display").innerText = currentFontSize + "%";
      localStorage.setItem("awhiy-fontsize", currentFontSize);
      localStorage.setItem("awhiy-fontfamily", currentFontFamily);

      document.getElementById("font-serif").classList.toggle("active", currentFontFamily.includes("serif"));
      document.getElementById("font-sans").classList.toggle("active", !currentFontFamily.includes("serif"));
    }
    applyTypography();

    // Font Panel Toggles & Mobile Tap Fix
    document.getElementById("font-btn").onclick = (e) => { 
      e.stopPropagation();
      document.getElementById("font-panel").classList.toggle("show"); 
    };
    
    document.getElementById("increase-font").onclick = () => { if (currentFontSize < 200) currentFontSize += 10; applyTypography(); };
    document.getElementById("decrease-font").onclick = () => { if (currentFontSize > 80) currentFontSize -= 10; applyTypography(); };
    document.getElementById("font-serif").onclick = () => { currentFontFamily = "Georgia, serif"; applyTypography(); };
    document.getElementById("font-sans").onclick = () => { currentFontFamily = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"; applyTypography(); };

    function closeFontPanel(e) {
      if(!e.target.closest("#font-panel") && !e.target.closest("#font-btn")) {
        document.getElementById("font-panel").classList.remove("show");
      }
    }
    document.addEventListener("click", closeFontPanel);
    document.addEventListener("touchstart", closeFontPanel);

    // TOC Logic
    book.ready.then(() => book.navigation.get()).then((nav) => {
      const tocList = document.getElementById("toc-list"); tocList.innerHTML = ""; 
      if (nav.length > 0) {
        nav.forEach(chapter => {
          const li = document.createElement("li"), a = document.createElement("a");
          a.textContent = chapter.label.trim() || "Chapter"; a.href = chapter.href;
          a.onclick = (e) => { e.preventDefault(); rendition.display(chapter.href); closeMenu(); };
          li.appendChild(a); tocList.appendChild(li);
        });
      } else {
        book.spine.each((item, index) => {
          const li = document.createElement("li"), a = document.createElement("a");
          a.textContent = "Part " + (index + 1); a.href = item.href;
          a.onclick = (e) => { e.preventDefault(); rendition.display(item.href); closeMenu(); };
          li.appendChild(a); tocList.appendChild(li);
        });
      }
    });

    rendition.on("relocated", function(location) {
      localStorage.setItem("awhiy-progress", location.start.cfi);
      let currentLocText = "Page Turn";
      if (book.navigation && book.navigation.length > 0) {
        let navItem = book.navigation.get(location.start.href);
        if (navItem && navItem.label) currentLocText = navItem.label.trim();
      } else { currentLocText = "Reading..."; }
      document.getElementById("stats-text").innerText = currentLocText;
      document.getElementById("share-bar").classList.remove("active");
    });

    var savedLocation = localStorage.getItem("awhiy-progress");
    rendition.display(savedLocation || undefined);

    // Highlighting Logic
    let selectedText = "";
    rendition.on("selected", function(cfiRange, contents) {
      book.getRange(cfiRange).then(function(range) {
        selectedText = range.toString().trim();
        if (selectedText.length > 0) document.getElementById("share-bar").classList.add("active");
      });
    });

    rendition.on("click", () => { 
      document.getElementById("share-bar").classList.remove("active"); 
      document.getElementById("font-panel").classList.remove("show");
    });

    document.getElementById("close-share").onclick = () => document.getElementById("share-bar").classList.remove("active");
    document.getElementById("copy-btn").onclick = () => { navigator.clipboard.writeText(`"${selectedText}" — All We Have Is Yesterday\nRead it here: ${window.location.href}`); document.getElementById("copy-btn").innerText = "✅ Copied!"; setTimeout(() => document.getElementById("copy-btn").innerText = "📋 Copy", 2000); };
    document.getElementById("x-btn").onclick = () => { let tweetText = encodeURIComponent(`"${selectedText}"\n\n— All We Have Is Yesterday`); let tweetUrl = encodeURIComponent(window.location.href); window.open(`https://twitter.com/intent/tweet?text=${tweetText}&url=${tweetUrl}`, '_blank'); };

    // Navigation & Menus
    function openMenu() { document.getElementById("sidebar").classList.add("open"); document.getElementById("overlay").classList.add("show"); }
    function closeMenu() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("overlay").classList.remove("show"); }
    document.getElementById("open-menu").onclick = openMenu; document.getElementById("close-menu").onclick = closeMenu; document.getElementById("overlay").onclick = closeMenu;
    
    document.getElementById("theme-toggle").onclick = function() {
      document.body.classList.toggle("dark-mode");
      const isDark = document.body.classList.contains("dark-mode");
      rendition.themes.select(isDark ? "dark" : "light");
      document.querySelector('meta[name="theme-color"]').setAttribute('content', isDark ? '#121212' : '#f8f9fa');
      this.innerText = isDark ? "☀️" : "🌙";
    };

    document.getElementById("prev-btn").onclick = () => rendition.prev(); document.getElementById("next-btn").onclick = () => rendition.next();
    document.getElementById("left-zone").onclick = () => rendition.prev(); document.getElementById("right-zone").onclick = () => rendition.next();
    document.addEventListener("keyup", (e) => { if (e.key === "ArrowLeft") rendition.prev(); if (e.key === "ArrowRight") rendition.next(); });
  </script>
</body>
</html>
